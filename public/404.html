<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>אינטליגנציה קלורית</title>
    <script>
      // GitHub Pages SPA fallback:
      // redirect all unknown routes to index.html, preserving the path in the hash
      (function () {
        var l = window.location;
        var base = "/caloric-data-collector/";
        var path = l.pathname.startsWith(base) ? l.pathname.slice(base.length) : l.pathname.slice(1);
        var redirect = base + "#/" + path + l.search + l.hash;
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
